<!DOCTYPE html>
<html>
<head>
    <title>Pi Marketplace - Baya</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>مرحباً بك في إمبراطورية بايا</h1>
    <div id="products">
        </div>
    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function makePayment(price) {
            try {
                const payment = await Pi.createPayment({
                    amount: price,
                    memo: "شراء بوت التنبيهات من سوق بايا",
                    metadata: { productId: "whale-bot-01" }
                }, {
                    onReadyForServerApproval: (paymentId) => { /* سيتم ربطه بـ السيرفر */ },
                    onReadyForServerCompletion: (paymentId, txid) => { /* اكتمل الدفع */ },
                    onCancel: (paymentId) => { console.log("تم إلغاء العملية"); },
                    onError: (error, payment) => { console.error("خطأ!", error); }
                });
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
